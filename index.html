function MapNode({label, nodeEmoji, isSource, foc, appr, style}){

  const col  = isSource ? "#30333d" : "#4e56e6";

  return (

/* ── Map canvas ── */
function MapCanvas({approved, activeId, panelOpen}){
  const ref = useRef(null);
  const [size, setSize] = useState({w:800,h:600});
  useLayoutEffect(()=>{
    if(!ref.current) return;
    const ro = new ResizeObserver(([e])=>setSize({w:e.contentRect.width,h:e.contentRect.height}));
    ro.observe(ref.current);
    return ()=>ro.disconnect();
  },[]);

  const {w, h} = size;
  const PANEL_W = 454; // chat panel width
  const SIDEBAR_W = 56;

  // Visible area of the map: from panel right edge to canvas right edge
  // Panel overlays from x=0 in canvas space (sidebar already excluded)
  const visLeft  = panelOpen ? PANEL_W : 0;
  const visRight = w;
  const visW     = visRight - visLeft;
  const visCx    = visLeft + visW / 2; // center of visible map area

  const visible = GOALS.filter(g => approved.includes(g.id) || g.id === activeId);
  const hasAny  = visible.length > 0;

  // Node dimensions
  const nW = 153, nH = 88, gap = 28;
  const totalNodesW = visible.length * (nW + gap) - gap;

  // Source node: center it in visible area, near top
  const srcY  = 50;
  const srcX  = visCx - nW / 2;
  const srcCx = visCx;
  const srcBy = srcY + nH; // bottom of source node

  // Destination nodes: spread centered in visible area, below source
  const dstY  = srcY + 190;
  const dstX0 = visCx - totalNodesW / 2;

  return (
    <div ref={ref} className="dot-grid" style={{position:"absolute",inset:0,overflow:"hidden"}}>
      {hasAny && (
        <>
          {/* SVG arrows — drawn first, nodes sit on top */}
          <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:1,overflow:"visible"}}>
            <defs>
              <marker id="mh" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
                <circle cx="5" cy="5" r="3" fill="#4e56e6"/>
              </marker>
              <marker id="mg" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
                <circle cx="5" cy="5" r="2.5" fill="#c6c9d1"/>
              </marker>
            </defs>
            {visible.map((g, i) => {
              const dstCx = dstX0 + i * (nW + gap) + nW / 2;
              const dstCy = dstY; // top of dest node
              const sel   = approved.includes(g.id) || g.id === activeId;
              const col   = sel ? "#4e56e6" : "#c6c9d1";
              const mk    = sel ? "url(#mh)" : "url(#mg)";
              // S-curve: control points curve outward based on horizontal distance
              const dx = dstCx - srcCx;
              const dy = dstCy - srcBy;
              // Simple smooth bezier: cp1 drops straight down from source, cp2 comes straight up to dest
              const cp1x = srcCx;
              const cp1y = srcBy + dy * 0.5;
              const cp2x = dstCx;
              const cp2y = dstCy - dy * 0.3;
              const d = `M${srcCx},${srcBy} C${cp1x},${cp1y} ${cp2x},${cp2y} ${dstCx},${dstCy}`;
              return (
                <path key={g.id} d={d} fill="none"
                  stroke={col} strokeWidth={sel ? 1.5 : 1}
                  strokeDasharray={sel ? "none" : "6,4"}
                  markerEnd={mk}
                  style={{transition:"stroke .3s, stroke-dasharray .3s"}}
                />
              );
            })}
          </svg>

          {/* Source node — above arrows */}
          <MapNode label="Chase Checking" isSource
            style={{left:srcX, top:srcY, zIndex:2}}/>

          {/* Destination pod nodes — above arrows */}
          {visible.map((g, i) => (
            <MapNode key={g.id}
              label={g.nodeLabel}
              nodeEmoji={g.nodeEmoji}
              foc={g.id === activeId}
              appr={approved.includes(g.id)}
              style={{
                left: dstX0 + i * (nW + gap),
                top:  dstY,
                zIndex: 2,
                opacity: g.id === activeId || approved.includes(g.id) ? 1 : 0.35,
                transition: "opacity .3s, left .4s ease, top .4s ease",
              }}
            />
          ))}
        </>
      )}
    </div>
  );
}

/* ── App ── */
function App(){
  const PW = 454;

  // Panel open/close
  const [open,setOpen] = useState(true);

  // Conversation state
  // log: array of {id, type:"ai"|"user"|"banner"|"question", ...}
  const [log, setLog] = useState([]);
  const [typing, setTyping] = useState(false);

  // Which goal we're currently on (index into GOALS)
  const [goalIdx, setGoalIdx] = useState(0);
  // Which step within current goal's script
  const [stepIdx, setStepIdx] = useState(0);
  // Goals that have been fully activated (have nodes on map)
  const [activated, setActivated] = useState([]);
  // Current active node being discussed (for map highlight)
  const [activeNodeId, setActiveNodeId] = useState(null);
  // Has the flow started
  const [started, setStarted] = useState(false);
  // Current question card data (null = no question showing)
  const [currentQ, setCurrentQ] = useState(null);
  // Input value
  const [inp, setInp] = useState('');
  // All done
  const [allDone, setAllDone] = useState(false);

  const end = useRef(null);
  const addToLog = (item) => setLog(l => [...l, {id: Date.now()+Math.random(), ...item}]);

  useEffect(()=>{ end.current?.scrollIntoView({behavior:"smooth"}); },[log,currentQ,typing]);

  // When panel opens, show opening line and immediately start goal 0
  useEffect(()=>{
    if(open && log.length===0){
      setTyping(true);
      setTimeout(()=>{
        setTyping(false);
        addToLog({type:"ai", text:"You have seen the numbers. The savings rate is good — most people are not at 18%. But that $1,600 a month sitting in checking at 0% is the thing worth fixing first.\n\nLet us start with the most important one."});
        setTimeout(()=> startGoal(0), 800);
      }, 1000);
    }
  },[open]);

  // Advance through a goal's script steps
  function advanceScript(gIdx, sIdx){
    const goal = GOALS[gIdx];
    if(!goal) { setAllDone(true); return; }
    const step = goal.script[sIdx];
    if(!step){
      // Goal script finished — move to next goal
      return;
    }

    if(step.type === "confirm"){
      setTyping(true);
      setTimeout(()=>{
        setTyping(false);
        addToLog({type:"ai", text: step.text});
        setTimeout(()=>advanceScript(gIdx, sIdx+1), 400);
      }, 900);
    } else if(step.type === "question"){
      setTyping(true);
      setTimeout(()=>{
        setTyping(false);
        // Show question as AI message then surface the card
        addToLog({type:"ai", text: step.q});
        setTimeout(()=>{
          setCurrentQ({gIdx, sIdx, q: step.q, opts: step.opts});
        }, 300);
      }, 900);
    } else if(step.type === "banner"){
      setTyping(true);
      setTimeout(()=>{
        setTyping(false);
        addToLog({type:"ai", text:"Great! Now let's automate it."});
        setTimeout(()=>{
          addToLog({type:"banner", body: step.body, gIdx, sIdx});
        }, 400);
      }, 700);
    }
  }

  function startGoal(gIdx){
    setGoalIdx(gIdx);
    setStepIdx(0);
    setActiveNodeId(GOALS[gIdx]?.id || null);
    advanceScript(gIdx, 0);
  }



  function handleOptionPick(opt, gIdx, sIdx){
    setCurrentQ(null);
    addToLog({type:"user", text: opt});
    // Advance to next step
    advanceScript(gIdx, sIdx+1);
  }

  function handleSkipQuestion(gIdx, sIdx){
    setCurrentQ(null);
    addToLog({type:"user", text:"Skip"});
    advanceScript(gIdx, sIdx+1);
  }

  function handleActivate(gIdx){
    // Remove banner from log, mark goal activated
    setLog(l => l.filter(item => !(item.type==="banner" && item.gIdx===gIdx)));
    const goal = GOALS[gIdx];
    setActivated(p => [...p, goal.id]);
    setActiveNodeId(null);
    addToLog({type:"user", text:"Activate rule"});

    const nextIdx = gIdx + 1;
    const nextGoal = GOALS[nextIdx];

    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      if(nextGoal){
        addToLog({type:"ai", text:`${goal.name} sorted. Would you like to continue with ${nextGoal.name} now? You can always come back to this chat and pick up where you left off.`});
        setTimeout(()=>{
          addToLog({type:"continue", nextGoalName: nextGoal.name, nextIdx});
        }, 300);
      } else {
        addToLog({type:"ai", text:"That's your plan set up. All rules are now running. Money moves the next time income arrives. You can come back here any time to adjust or add more."});
        setAllDone(true);
        setActiveNodeId(null);
      }
    }, 800);
  }

  function handleChange(gIdx){
    setLog(l => l.filter(item => !(item.type==="banner" && item.gIdx===gIdx)));
    addToLog({type:"user", text:"I want to change something"});
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      addToLog({type:"ai", text:"Of course. What would you like to adjust?"});
      // Re-show the question for the goal's first question step
      const goal = GOALS[gIdx];
      const qStep = goal.script.find(s=>s.type==="question");
      if(qStep){
        setTimeout(()=> setCurrentQ({gIdx, sIdx: goal.script.indexOf(qStep), q:qStep.q, opts:qStep.opts}), 400);
      }
    }, 700);
  }

  function handleContinue(nextIdx){
    setLog(l => l.filter(item => item.type !== "continue"));
    addToLog({type:"user", text:`Yes, let's do ${GOALS[nextIdx].name}`});
    startGoal(nextIdx);
  }

  function handleSkipGoal(nextIdx){
    setLog(l => l.filter(item => item.type !== "continue"));
    addToLog({type:"user", text:"Not now"});
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      addToLog({type:"ai", text:"No problem. You can always come back to this chat and continue from here."});
    }, 600);
  }

  function handleSend(){
    if(!inp.trim()) return;
    addToLog({type:"user", text:inp});
    setInp('');
    setTimeout(()=>addToLog({type:"ai", text:"Got it. Let me know if you want to adjust anything else."}), 800);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#f6f7f8",overflow:"hidden"}}>
      <TopBar/>
      <div style={{flex:1,display:"flex",overflow:"hidden",position:"relative"}}>
        <Sidebar onAI={()=>setOpen(p=>!p)}/>
        <div style={{flex:1,position:"relative",overflow:"hidden"}}>
          <MapCanvas approved={activated} activeId={activeNodeId} panelOpen={open}/>
          <CmdBar panelOpen={open}/>
        </div>

        {open && (
          <div style={{position:"absolute",top:0,left:56,width:PW,height:"100%",background:"#fff",borderRight:"1px solid #e0e3e8",boxShadow:"2px 0 12px rgba(17,19,26,.1)",display:"flex",flexDirection:"column",zIndex:30,animation:"panelIn .2s ease"}}>
            {/* Header */}
            <div style={{height:57,borderBottom:"1px solid #e0e3e8",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16,fontWeight:600,color:"#11131a"}}>Sequence Builder</span>
                <div style={{background:"#4e56e6",borderRadius:4,padding:"3px 5px"}}><span style={{fontSize:10,fontWeight:600,color:"#fff",letterSpacing:".1px"}}>Beta</span></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>window.location.reload()} style={{background:"none",border:"none",cursor:"pointer",padding:4,color:"#868a94",display:"flex",borderRadius:4}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f6f7f8"} onMouseLeave={e=>e.currentTarget.style.background="none"}><IRefresh/></button>
                <button onClick={()=>setOpen(false)} style={{background:"none",border:"none",cursor:"pointer",padding:4,color:"#868a94",display:"flex",borderRadius:4}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f6f7f8"} onMouseLeave={e=>e.currentTarget.style.background="none"}><IDown/></button>
              </div>
            </div>

            {/* Chat scroll */}
            <div style={{flex:1,overflowY:"auto",padding:"24px 16px 8px"}}>
              {log.map(item=>{
                if(item.type==="ai")    return <AIMsg  key={item.id} text={item.text}/>;
                if(item.type==="user")  return <UserMsg key={item.id} text={item.text}/>;
                if(item.type==="banner") return (
                  <WhatWillHappen key={item.id} body={item.body}
                    onActivate={()=>handleActivate(item.gIdx)}
                    onChange={()=>handleChange(item.gIdx)}/>
                );
                if(item.type==="continue") return (
                  <div key={item.id} style={{display:"flex",gap:8,marginBottom:12,marginTop:4,animation:"fadeIn .2s ease"}}>
                    <button onClick={()=>handleContinue(item.nextIdx)} style={{padding:"6px 16px",background:"#4e56e6",border:"none",borderRadius:99,fontSize:13,fontWeight:600,color:"#fff",cursor:"pointer",fontFamily:"'Inter',sans-serif",lineHeight:"18px",flexShrink:0}}
                      onMouseEnter={e=>e.currentTarget.style.opacity=".88"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                      Yes, let's do {item.nextGoalName}
                    </button>
                    <button onClick={()=>handleSkipGoal(item.nextIdx)} style={{padding:"6px 16px",background:"#fff",border:"1px solid #e0e3e8",borderRadius:99,fontSize:13,fontWeight:600,color:"#545863",cursor:"pointer",fontFamily:"'Inter',sans-serif",lineHeight:"18px",flexShrink:0}}
                      onMouseEnter={e=>e.currentTarget.style.background="#f6f7f8"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                      Not now
                    </button>
                  </div>
                );
                return null;
              })}
              {typing && <Typing/>}
              <div ref={end}/>
            </div>

            {/* Bottom: question card or composer */}
            {currentQ
              ? <QuestionCard
                  question={currentQ.q}
                  opts={currentQ.opts}
                  onPick={opt=>handleOptionPick(opt, currentQ.gIdx, currentQ.sIdx)}
                  onSkip={()=>handleSkipQuestion(currentQ.gIdx, currentQ.sIdx)}/>
              : <Composer val={inp} setVal={setInp} onSend={handleSend}
                  ph="Ask anything, or say what you'd like to change..."/>
            }
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
